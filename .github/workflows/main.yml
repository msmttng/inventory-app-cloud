name: Inventory Data Scraper

on:
  # schedule:
  #   # JST 9:00-19:00 のみ30分おきに実行（全Phase一括）
  #   # ローカルのタスクスケジューラ運用に移行したため、クラウドでの自動定期実行は無効化・停止しました
  #   - cron: '*/30 0-9 * * *'
  #   - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium

    - name: Run extractor script
      env:
        GOOGLE_AUTH_STATE_BASE64: ${{ secrets.GOOGLE_AUTH_STATE_BASE64 }}
        MEDORDER_EMAIL: ${{ secrets.MEDORDER_EMAIL }}
        MEDORDER_PASSWORD: ${{ secrets.MEDORDER_PASSWORD }}
        ORDER_EPI_ID: ${{ secrets.ORDER_EPI_ID }}
        ORDER_EPI_PASSWORD: ${{ secrets.ORDER_EPI_PASSWORD }}
        COLLABO_ID: ${{ secrets.COLLABO_ID }}
        COLLABO_PASSWORD: ${{ secrets.COLLABO_PASSWORD }}
      run: |
        python extract_data.py
