function randomIdPlusGet(){
	var myDt = new Date();
	var ran = Math.floor(Math.random() * 100);
	return ""+myDt.getHours()+myDt.getMinutes()+myDt.getSeconds()+myDt.getMilliseconds()+ran;
}

<script language="JavaScript">
function submitSkip(){
  //画面ロック
  loginWaitMask();

  user_id =comCookieLsGet("KURAYA_ID","YUKOKIGENARI");
  user_passwd = comCookieLsGet("KURAYA_PASSWD","YUKOKIGENARI");
  pass_window = comCookieLsGet("PASS_WINDOW","YUKOKIGENARI");
  kengen      = comCookieLsGet("KENGEN","YUKOKIGENARI");
  sub_kengen  = comCookieLsGet("SUB_KENGEN","YUKOKIGENARI");

  if(user_id==""){
    alert("Cookie情報が登録されていません！");
  }else{
    comCookieLsSet("KURAYA_ID",user_id,document.getElementById("MODELKBN").value,"/order","YUKOKIGENARI");
    comCookieLsSet("KURAYA_PASSWD",user_passwd,document.getElementById("MODELKBN").value,"/order","YUKOKIGENARI");
    comCookieLsSet("PASS_WINDOW",pass_window,document.getElementById("MODELKBN").value,"/order","YUKOKIGENARI");
    comCookieLsSet("KENGEN",kengen,document.getElementById("MODELKBN").value,"/order","YUKOKIGENARI");
    comCookieLsSet("SUB_KENGEN",sub_kengen,document.getElementById("MODELKBN").value,"/order","YUKOKIGENARI");
    comCookieLsSet("HU_GMNFLG","",document.getElementById("MODELKBN").value,"/order","YUKOKIGENARI");

    document.form1.USER_ID.value = user_id;
    document.form2.PASSWD.value = user_passwd;
	document.form1.PASSWD.value = document.form2.PASSWD.value;


      //インターネット(運用機)
      document.form1.action = "https://www.order-epi.com/order/servlet/LoginUserServlet";

    var vRandomId = randomIdPlusGet();
    document.getElementById("SESSION_ID").value = vRandomId;

    document.form1.USE_COOKIE_LOGIN.value = "on"; // クッキーを使用しているフラグ
    document.form1.USE_PASSWORD_WINDOW.value = pass_window; // パスワード画面を使用するかのフラグ
    document.form1.target = "_self";

    // ** 開いたwindowにデータ送信 ** //
    document.form1.submit();
    //console.log("ログイン実行");
  }

}
