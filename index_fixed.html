<!DOCTYPE html>
<html lang=\\"ja\\">

<head>
  <base target=\\"_top\\">
  <meta charset=\\"UTF-8\\">
  <meta name=\\"viewport\\" content=\\"width=device-width, initial-scale=1.0\\">
  <title>薬の在庫・棚番検索アプリ<\\/title>

  <script src=\\"https://cdn.tailwindcss.com\\"><\\/script>
  <script src=\\"https://unpkg.com/vue@3/dist/vue.global.js\\"><\\/script>
  <link rel=\\"stylesheet\\" href=\\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css\\">
  <link href=\\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap\\" rel=\\"stylesheet\\">

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .low-stock-border { border-left-color: #f59e0b !important; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.65; } }
    input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:4px; background:#e0e7ff; outline:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%; background:#6366f1; cursor:pointer; }
    .shelf-card { transition: box-shadow 0.2s; }
    .shelf-card:hover { box-shadow: 0 8px 20px -4px rgba(0,0,0,0.12); }
  <\\/style>
<\\/head>

<body class=\\"antialiased text-gray-800\\">
<div id=\\"app\\" class=\\"min-h-screen flex flex-col items-center p-4 sm:p-6 md:p-8\\">

  
  <header class=\\"w-full max-w-3xl mb-4 mt-4 text-center\\">
    <h1 class=\\"text-3xl sm:text-4xl font-bold text-indigo-700 tracking-tight flex items-center justify-center gap-3\\">
      <i class=\\"fa-solid fa-pills mb-1\\"><\\/i> 在庫・棚番 検索
    <\\/h1>
    <div class=\\"flex items-center justify-center gap-3 mt-2\\">
      <p class=\\"text-gray-400 text-xs flex items-center gap-1\\">
        <i class=\\"fa-regular fa-clock\\"><\\/i>
        <span v-if=\\"lastUpdated\\">最終更新: {{ lastUpdated }}<\\/span>
        <span v-else>更新日時を読み込み中...<\\/span>
      <\\/p>
      <a href=\\"https://app.medorder.jp/pharmacies/20/stocks\\" target=\\"_blank\\" rel=\\"noopener\\"
        class=\\"inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 hover:shadow transition-all duration-200\\">
        <i class=\\"fa-solid fa-arrow-up-right-from-square text-[10px]\\"><\\/i>MedOrderで在庫確認
      <\\/a>
    <\\/div>
  <\\/header>

  
  <nav class=\\"w-full max-w-3xl mb-4\\">
    <div class=\\"glass-card rounded-xl p-1 flex gap-1 flex-wrap\\">
      <button @click=\\"activeTab = 'search'\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1\\"
        :class=\\"activeTab === 'search' ? 'bg-indigo-600 text-white shadow' : 'text-gray-500 hover:bg-gray-100'\\">
        <i class=\\"fa-solid fa-magnifying-glass text-sm\\"><\\/i>検索
      <\\/button>
      <button @click=\\"switchToShelfTab\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1\\"
        :class=\\"activeTab === 'shelf' ? 'bg-indigo-600 text-white shadow' : 'text-gray-500 hover:bg-gray-100'\\">
        <i class=\\"fa-solid fa-layer-group text-sm\\"><\\/i>棚番
      <\\/button>
      <button @click=\\"switchToAlertTab\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1 relative\\"
        :class=\\"activeTab === 'alert' ? 'bg-red-500 text-white shadow' : 'text-gray-500 hover:bg-gray-100'\\">
        <i class=\\"fa-solid fa-triangle-exclamation text-sm\\"><\\/i>発注
        <span v-if=\\"alertData.total &gt; 0 &amp;&amp; activeTab !== 'alert'\\"
          class=\\"absolute -top-1 -right-1 min-w-[18px] h-[18px] bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center px-1\\">
          {{ alertData.total > 99 ? '99+' : alertData.total }}
        <\\/span>
      <\\/button>
      <button @click=\\"switchToReturnTab\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1\\"

        <i class=\\"fa-solid fa-rotate-left text-sm\\"><\\/i>返品
      <\\/button>
      <button @click=\\"switchToDeadTab\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1\\"

        <i class=\\"fa-solid fa-ghost text-sm\\"><\\/i>不動
      <\\/button>
      <button @click=\\"switchToLiveTab\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1\\"
        :class=\\"activeTab === 'live' ? 'bg-green-600 text-white shadow' : 'text-gray-500 hover:bg-gray-100'\\">
        <i class=\\"fa-solid fa-satellite-dish text-sm\\"><\\/i>RT
      <\\/button>
      
      <button @click=\\"switchToMinusTab\\"
        class=\\"flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1 relative\\"
        :class=\\"activeTab === 'minus' ? 'bg-rose-700 text-white shadow' : 'text-gray-500 hover:bg-gray-100'\\">
        <i class=\\"fa-solid fa-circle-minus text-sm\\"><\\/i>マイナス
        <span v-if=\\"minusStockItems.length &gt; 0 &amp;&amp; activeTab !== 'minus'\\"

          {{ minusStockItems.length > 99 ? '99+' : minusStockItems.length }}
        <\\/span>
      <\\/button>
    <\\/div>
  <\\/nav>

  <main class=\\"w-full max-w-3xl\\">

    
    <div v-if=\\"activeTab === 'search'\\">
      <div class=\\"glass-card rounded-2xl p-4 sm:p-6 mb-4\\">
        <form @submit.prevent=\\"performSearch\\" class=\\"mb-4\\">
          <div class=\\"relative flex items-center w-full h-14 rounded-xl bg-white overflow-hidden border-2 border-indigo-100 focus-within:border-indigo-500 focus-within:shadow-lg transition-all duration-300\\">
            <div class=\\"grid place-items-center h-full w-12\\">
              <i class=\\"fa-solid fa-magnifying-glass text-indigo-400\\"><\\/i>
            <\\/div>
            <input v-model=\\"searchQuery\\"

              class=\\"h-full px-4 text-gray-400 hover:text-red-500 transition-colors\\">
              <i class=\\"fa-solid fa-xmark\\"><\\/i>
            <\\/button>
            <button type=\\"submit\\"
              class=\\"bg-indigo-600 hover:bg-indigo-700 text-white h-full px-6 font-semibold text-sm sm:text-base min-w-[90px] flex items-center justify-center transition-colors\\"

              :class=\\"{ 'opacity-50 cursor-not-allowed': isLoading || searchQuery.trim() === '' }\\">
              <span v-if=\\"!isLoading\\">検索<\\/span>
              <i v-else class=\\"fa-solid fa-circle-notch spinner text-lg\\"><\\/i>
            <\\/button>
          <\\/div>
        <\\/form>
        
        <div v-if=\\"recentSearches.length &gt; 0 || topSearches.length &gt; 0\\" class=\\"border-t border-gray-100 pt-3 mb-3\\">

          
          <div v-if=\\"topSearches.length &gt; 0\\" class=\\"mb-3\\">
            <div class=\\"flex items-center justify-between mb-1.5\\">
              <span class=\\"text-[11px] font-bold text-indigo-400 uppercase tracking-wider flex items-center gap-1\\">

              <\\/span>
            <\\/div>
            <div class=\\"flex flex-wrap gap-1.5\\">
              <button v-for=\\"item in topSearches\\" :key=\\"item.query\\"
                @click=\\"applyHistoryQuery(item.query)\\"
                class=\\"inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition-all shadow-sm\\">
                <i class=\\"fa-solid fa-fire text-yellow-300 text-[10px]\\"><\\/i>
                {{ item.query }}
                <span class=\\"bg-indigo-500 rounded-full px-1.5 py-0.5 text-[10px] font-black ml-0.5\\">{{ item.count }}<\\/span>
              <\\/button>
            <\\/div>
          <\\/div>

          
          <div v-if=\\"recentSearches.length &gt; 0\\">
            <div class=\\"flex items-center justify-between mb-1.5\\">
              <span class=\\"text-[11px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1\\">
                <i class=\\"fa-solid fa-clock-rotate-left\\"><\\/i> 最近の検索
              <\\/span>
              <button @click=\\"clearHistory\\"
                class=\\"text-[11px] text-gray-300 hover:text-red-400 transition-colors flex items-center gap-1\\">
                <i class=\\"fa-solid fa-trash-can text-[10px]\\"><\\/i> 履歴を削除
              <\\/button>
            <\\/div>
            <div class=\\"flex flex-wrap gap-1.5\\">
              <button v-for=\\"item in recentSearches\\" :key=\\"item.query\\"
                @click=\\"applyHistoryQuery(item.query)\\"
                class=\\"inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200 border border-transparent transition-all\\">
                <i class=\\"fa-solid fa-clock-rotate-left text-[10px] text-gray-400\\"><\\/i>
                {{ item.query }}
              <\\/button>
            <\\/div>
          <\\/div>
        <\\/div>

        <div class=\\"border-t border-gray-100 pt-4\\">
          <div class=\\"flex items-center justify-between mb-2\\">
            <label class=\\"text-xs font-semibold text-gray-500 flex items-center gap-2\\">
              <i class=\\"fa-solid fa-triangle-exclamation text-amber-400\\"><\\/i>在庫わずか警告ライン
            <\\/label>
            <span class=\\"text-sm font-bold text-amber-500 bg-amber-50 border border-amber-200 rounded-full px-3 py-0.5\\">{{ lowStockThreshold }} 個以下<\\/span>
          <\\/div>
          <input type=\\"range\\" v-model.number=\\"lowStockThreshold\\" min=\\"0\\" max=\\"100\\" step=\\"1\\" />
          <div class=\\"flex justify-between text-xs text-gray-300 mt-1\\"><span>0<\\/span><span>50<\\/span><span>100<\\/span><\\/div>
        <\\/div>
      <\\/div>
      <div v-if=\\"errorMsg\\" class=\\"bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded-r-lg flex items-start fade-in\\">
        <i class=\\"fa-solid fa-triangle-exclamation text-red-500 mt-1 mr-3\\"><\\/i>
        <p class=\\"text-red-700\\">{{ errorMsg }}<\\/p>
      <\\/div>
      <div v-if=\\"hasSearched &amp;&amp; !isLoading\\">
        <div v-if=\\"results.length === 0\\" class=\\"glass-card rounded-2xl p-10 text-center fade-in flex flex-col items-center\\">
          <div class=\\"w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4\\">
            <i class=\\"fa-solid fa-box-open text-3xl text-gray-300\\"><\\/i>
          <\\/div>
          <h3 class=\\"text-lg font-medium text-gray-900 mb-1\\">見つかりませんでした<\\/h3>
          <p class=\\"text-gray-500 text-sm\\">「{{ lastSearchedQuery }}」に一致する薬は登録されていません。<\\/p>
        <\\/div>
        <div v-else>
          <div class=\\"flex justify-between items-center mb-3 px-2\\">
            <h2 class=\\"text-lg font-semibold text-gray-700\\">検索結果<\\/h2>
            <div class=\\"flex items-center gap-2\\">
              <span v-if=\\"lowStockCount &gt; 0\\" class=\\"text-xs font-medium bg-amber-100 text-amber-700 py-1 px-3 rounded-full flex items-center gap-1 low-stock-pulse\\">
                <i class=\\"fa-solid fa-triangle-exclamation text-xs\\"><\\/i> 在庫わずか {{ lowStockCount }}件
              <\\/span>
              <span class=\\"text-xs font-medium bg-indigo-100 text-indigo-800 py-1 px-3 rounded-full\\">合致 {{ primaryResults.length }}件 <span v-if=\\"alternativeResults.length &gt; 0\\">/ 代替 {{ alternativeResults.length }}件<\\/span><\\/span>
            <\\/div>
          <\\/div>
          <div class=\\"space-y-3 mb-6\\">
            <div v-for=\\"(item, index) in primaryResults\\" :key=\\"'p'&#43;index\\"
              class=\\"glass-card rounded-xl p-5 border-l-4 border-indigo-500 hover:shadow-md transition-shadow fade-in\\"
              :class=\\"{ 'low-stock-border': isLowStock(item.stock) }\\"
              :style=\\"'animation-delay:' &#43; (index * 0.04) &#43; 's'\\">

                  <div class=\\"flex items-center gap-2 mb-1 flex-wrap\\">
                    <span class=\\"text-xs text-indigo-500 font-bold tracking-wider uppercase\\">薬品名<\\/span>

                    <span v-if=\\"item.type &amp;&amp; item.type.includes('先発')\\" class=\\"text-[10px] font-bold text-blue-700 bg-blue-100 border border-blue-200 rounded px-1.5 py-0.5\\">先発品<\\/span>
                    <span v-if=\\"isLowStock(item.stock)\\" class=\\"text-xs font-bold text-amber-600 bg-amber-100 border border-amber-200 rounded-full px-2 py-0.5 flex items-center gap-1 low-stock-pulse\\">
                      <i class=\\"fa-solid fa-triangle-exclamation text-xs\\"><\\/i> 在庫わずか
                    <\\/span>
                  <\\/div>
                  <h3 class=\\"text-lg sm:text-xl font-bold text-gray-900 leading-tight break-words\\">{{ item.name }}<\\/h3>
                <\\/div>
                <div class=\\"shrink-0 flex items-start\\">
                  <div class=\\"rounded-lg p-2 sm:p-3 min-w-[70px] sm:min-w-[90px] text-center border transition-colors flex flex-col justify-center\\"
                    :class=\\"isLowStock(item.stock) ? 'bg-amber-50 border-amber-200' : 'bg-gray-50 border-gray-100'\\">
                    <div class=\\"text-[10px] sm:text-xs font-medium mb-1\\" :class=\\"isLowStock(item.stock) ? 'text-amber-600' : 'text-gray-500'\\">
                      <i class=\\"fa-solid fa-cubes mr-1\\" :class=\\"isLowStock(item.stock) ? 'text-amber-400' : 'text-gray-400'\\"><\\/i>在庫数
                    <\\/div>
                    <div class=\\"text-xl sm:text-2xl font-bold\\" :class=\\"isLowStock(item.stock) ? 'text-amber-600' : 'text-gray-800'\\">
                      {{ item.stock !== '' ? item.stock : '-' }}

                  <\\/div>
                <\\/div>
              <\\/div>
              <div class=\\"bg-indigo-50 rounded-lg px-3 py-2.5 border border-indigo-100 flex items-start sm:items-center flex-col sm:flex-row shadow-inner\\">
                <div class=\\"text-[11px] sm:text-xs text-indigo-500 font-bold whitespace-nowrap mr-3 mb-1 sm:mb-0\\"><i class=\\"fa-solid fa-layer-group mr-1.5 opacity-70\\"><\\/i>棚番:<\\/div>
                <div class=\\"text-sm sm:text-base font-bold text-indigo-800 break-words leading-tight\\">{{ item.shelf !== '' ? item.shelf : '-' }}<\\/div>
              <\\/div>
            <\\/div>
          <\\/div>
        <\\/div>
      <\\/div>
      <div v-if=\\"alternativeResults.length &gt; 0\\" class=\\"mt-8 fade-in\\" style=\\"animation-delay: 0.3s\\">
        <div class=\\"flex items-center gap-2 mb-3 px-2\\">
          <i class=\\"fa-solid fa-code-compare text-teal-500\\"><\\/i>
          <h2 class=\\"text-md font-bold text-gray-700\\">同じ成分の代替薬 <span class=\\"text-xs font-normal text-gray-400 ml-1\\">（{{ alternativeResults.length }}件）<\\/span><\\/h2>
        <\\/div>
        <div class=\\"space-y-3\\">
          <div v-for=\\"(item, index) in alternativeResults\\" :key=\\"'a'&#43;index\\"
            class=\\"glass-card rounded-xl p-4 border-l-4 border-teal-400 hover:shadow-md transition-shadow bg-gradient-to-r from-teal-50/30 to-transparent\\"
            :class=\\"{ 'low-stock-border': isLowStock(item.stock) }\\">
            <div class=\\"flex justify-between items-start gap-4 mb-3\\">
              <div class=\\"flex-1 min-w-0 pr-2 pb-1 sm:pb-0\\">
                <div class=\\"flex items-center gap-2 mb-1 flex-wrap\\">
                  <span class=\\"text-[10px] font-bold text-teal-700 bg-teal-100 border border-teal-200 rounded px-1.5 py-0.5\\">代替提案<\\/span>
                  <span v-if=\\"item.type &amp;&amp; item.type.includes('後発')\\" class=\\"text-[10px] font-bold text-teal-700 bg-teal-100 border border-teal-200 rounded px-1.5 py-0.5\\">後発品<\\/span>
                  <span v-if=\\"item.type &amp;&amp; item.type.includes('先発')\\" class=\\"text-[10px] font-bold text-blue-700 bg-blue-100 border border-blue-200 rounded px-1.5 py-0.5\\">先発品<\\/span>
                <\\/div>
                <h3 class=\\"text-base sm:text-lg font-bold text-gray-800 leading-tight break-words\\">{{ item.name }}<\\/h3>
              <\\/div>
              <div class=\\"shrink-0 flex items-start\\">
                <div class=\\"rounded-lg p-2 min-w-[65px] sm:min-w-[80px] text-center border transition-colors flex flex-col justify-center\\"
                  :class=\\"isLowStock(item.stock) ? 'bg-amber-50 border-amber-200' : 'bg-white border-gray-100'\\">
                  <div class=\\"text-[10px] font-medium mb-0.5\\" :class=\\"isLowStock(item.stock) ? 'text-amber-600' : 'text-gray-500'\\">在庫<\\/div>
                  <div class=\\"text-lg sm:text-xl font-bold\\" :class=\\"isLowStock(item.stock) ? 'text-amber-600' : 'text-gray-800'\\">{{ item.stock !== '' ? item.stock : '-' }}<\\/div>
                <\\/div>
              <\\/div>
            <\\/div>
            <div class=\\"bg-teal-50 rounded-lg px-3 py-2.5 border border-teal-100 flex items-start sm:items-center flex-col sm:flex-row shadow-inner\\">
              <div class=\\"text-[11px] sm:text-xs text-teal-600 font-bold whitespace-nowrap mr-3 mb-1 sm:mb-0\\"><i class=\\"fa-solid fa-layer-group mr-1.5 opacity-70\\"><\\/i>棚番:<\\/div>
              <div class=\\"text-sm sm:text-base font-bold text-teal-800 break-words leading-tight\\">{{ item.shelf !== '' ? item.shelf : '-' }}<\\/div>
            <\\/div>
          <\\/div>
        <\\/div>
      <\\/div>
      <div v-if=\\"!hasSearched &amp;&amp; !isLoading\\" class=\\"glass-card rounded-2xl p-10 text-center text-gray-400 mt-2\\">
        <i class=\\"fa-solid fa-magnifying-glass text-4xl mb-4 opacity-20 block\\"><\\/i>
        <p>上部の検索窓に薬の名前を入力して検索してください<\\/p>
      <\\/div>
    <\\/div>

    
    <div v-if=\\"activeTab === 'shelf'\\">
      <div v-if=\\"shelfLoading\\" class=\\"glass-card rounded-2xl p-12 text-center\\">
        <i class=\\"fa-solid fa-circle-notch spinner text-4xl text-indigo-400 block mb-4\\"><\\/i>
        <p class=\\"text-gray-400\\">棚番データを読み込み中...<\\/p>
      <\\/div>
      <div v-else-if=\\"shelfError\\" class=\\"bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded-r-lg flex items-start\\">
        <i class=\\"fa-solid fa-triangle-exclamation text-red-500 mt-1 mr-3\\"><\\/i>
        <p class=\\"text-red-700\\">{{ shelfError }}<\\/p>
      <\\/div>
      <div v-else-if=\\"shelfData.length &gt; 0\\">
        <div class=\\"glass-card rounded-xl p-4 mb-4 flex flex-col gap-3\\">
          <div class=\\"relative w-full\\">
            <i class=\\"fa-solid fa-filter absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm\\"><\\/i>
            <input v-model=\\"shelfFilter\\" type=\\"text\\" placeholder=\\"棚番または薬品名で絞り込み...\\"
              class=\\"w-full pl-9 pr-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-indigo-400 bg-white\\" />
          <\\/div>
          <div class=\\"flex flex-wrap items-center gap-2\\">
            <span class=\\"text-xs font-semibold text-gray-400 mr-1\\">並び替え：<\\/span>
            <button v-for=\\"opt in sortOptions\\" :key=\\"opt.value\\" @click=\\"shelfSort = opt.value\\"
              class=\\"text-xs font-semibold px-3 py-1.5 rounded-lg border transition-all\\"
              :class=\\"shelfSort === opt.value ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:border-indigo-400 hover:text-indigo-600'\\">
              <i :class=\\"opt.icon\\" class=\\"mr-1\\"><\\/i>{{ opt.label }}
            <\\/button>

<script>
  const { createApp, ref, computed, reactive, onMounted } = Vue;

  createApp({
    setup() {
      const activeTab = ref('search');
      const lastUpdated = ref('');
      const lowStockThreshold = ref(10);

      const isLowStock = (stock) => {
        const num = parseFloat(stock);
        return !isNaN(num) && num <= lowStockThreshold.value;
      };

      const getShelfWeight = (shelfName) => {
        if (!shelfName) return 999;
        const order = ['汎用左','汎用右','引出し','汎用横','ｾﾝﾀｰ 下','ｾﾝﾀｰ 下 右','軟膏','ｻｰﾊﾞｰ下','ｸﾗｲｱﾝﾄ下','天秤下'];
        let bestIdx = 999, maxLen = 0;
        for (let i = 0; i < order.length; i++) {
          if (shelfName.includes(order[i]) && order[i].length > maxLen) { bestIdx = i; maxLen = order[i].length; }
        }
        return bestIdx;
      };

      
      const searchQuery = ref('');
      const lastSearchedQuery = ref('');
      const results = ref([]);
      const isLoading = ref(false);
      const hasSearched = ref(false);
      const errorMsg = ref('');

      const primaryResults = computed(() => results.value.filter(i => i.isPrimary !== false));
      const alternativeResults = computed(() => results.value.filter(i => i.isPrimary === false));
      const lowStockCount = computed(() => primaryResults.value.filter(i => isLowStock(i.stock)).length);

      
      
      const historyMap = reactive({});
      const HISTORY_MAX = 20;    
      const TOP_MIN_COUNT = 3;   
      const TOP_MAX = 3;         
      const RECENT_MAX = 8;      

      
      const recordHistory = (query) => {
        const q = query.trim();
        if (!q) return;
        if (historyMap[q]) {
          historyMap[q].count++;
          historyMap[q].lastUsed = Date.now();
        } else {
          
          const keys = Object.keys(historyMap);
          if (keys.length >= HISTORY_MAX) {
            const oldest = keys.reduce((a, b) => historyMap[a].lastUsed < historyMap[b].lastUsed ? a : b);
            delete historyMap[oldest];
          }
          historyMap[q] = { count: 1, lastUsed: Date.now() };
        }
      };

      
      const topSearches = computed(() =>
        Object.entries(historyMap)
          .filter(([, v]) => v.count >= TOP_MIN_COUNT)
          .sort(([, a], [, b]) => b.count - a.count)
          .slice(0, TOP_MAX)
          .map(([query, v]) => ({ query, count: v.count }))
      );

      
      const recentSearches = computed(() => {
        const topSet = new Set(topSearches.value.map(i => i.query));
        return Object.entries(historyMap)
          .filter(([q]) => !topSet.has(q))
          .sort(([, a], [, b]) => b.lastUsed - a.lastUsed)
          .slice(0, RECENT_MAX)
          .map(([query, v]) => ({ query, count: v.count }));
      });

      
      const applyHistoryQuery = (query) => {
        searchQuery.value = query;
        performSearch();
      };

      
      const clearHistory = () => {
        Object.keys(historyMap).forEach(k => delete historyMap[k]);
      };
      

      const performSearch = () => {
        const query = searchQuery.value.trim();
        if (!query) return;
        isLoading.value = true; errorMsg.value = ''; lastSearchedQuery.value = query;
        recordHistory(query); 
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((data) => { results.value = data; isLoading.value = false; hasSearched.value = true; })
            .withFailureHandler((err) => { errorMsg.value = 'エラー: ' + err.message; isLoading.value = false; hasSearched.value = true; results.value = []; })
            .searchMedicine(query);
        } else {
          setTimeout(() => {
            results.value = [
              { name: 'オルガドロン点眼液0.1%', stock: 3, shelf: '軟膏-1 0-4', isPrimary: true, type: '先発品' },
              { name: '代替ダミー点眼液0.1%', stock: 50, shelf: '汎用-1', isPrimary: false, type: '後発品' }
            ].filter(i => i.name.toLowerCase().includes(query.toLowerCase()) || !i.isPrimary);
            isLoading.value = false; hasSearched.value = true;
          }, 700);
        }
      };
      const clearSearch = () => { searchQuery.value = ''; document.getElementById('search').focus(); };

      
      const shelfData = ref([]);
      const shelfLoading = ref(false);
      const shelfError = ref('');
      const shelfFilter = ref('');
      const openedShelves = reactive(new Set());
      const openedGroups = reactive(new Set());
      let shelfLoaded = false;
      const shelfSort = ref('name');
      const sortOptions = [
        { value: 'name', label: '棚番順', icon: 'fa-solid fa-arrow-down-a-z' },
        { value: 'lowstock', label: '在庫わずか順', icon: 'fa-solid fa-triangle-exclamation' },
        { value: 'count', label: '品目数順', icon: 'fa-solid fa-list-ol' },
      ];
      const shelfLowStockCount = (shelf) => shelf.items.filter(i => isLowStock(i.stock)).length;
      const filteredShelfData = computed(() => {
        let data = shelfData.value;
        if (shelfFilter.value.trim()) {
          const q = shelfFilter.value.toLowerCase();
          data = data.filter(s => s.shelf.toLowerCase().includes(q) || s.items.some(i => i.name.toLowerCase().includes(q)));
        }
        return [...data].sort((a, b) => {
          if (shelfSort.value === 'lowstock') return shelfLowStockCount(b) - shelfLowStockCount(a);
          if (shelfSort.value === 'count') return b.items.length - a.items.length;
          const wA = getShelfWeight(a.shelf), wB = getShelfWeight(b.shelf);
          return wA !== wB ? wA - wB : a.shelf.localeCompare(b.shelf, 'ja');
        });
      });
      const hierarchyData = computed(() => {
        const groupMap = {};
        filteredShelfData.value.forEach(shelf => {
          const dashIdx = shelf.shelf.indexOf('-');
          const groupName = dashIdx > -1 ? shelf.shelf.slice(0, dashIdx) : shelf.shelf;
          if (!groupMap[groupName]) groupMap[groupName] = { groupName, shelves: [], totalItems: 0, lowStockTotal: 0 };
          groupMap[groupName].shelves.push(shelf);
          groupMap[groupName].totalItems += shelf.items.length;
          groupMap[groupName].lowStockTotal += shelfLowStockCount(shelf);
        });
        const groups = Object.values(groupMap);
        if (shelfSort.value === 'lowstock') groups.sort((a, b) => b.lowStockTotal - a.lowStockTotal);
        else if (shelfSort.value === 'count') groups.sort((a, b) => b.totalItems - a.totalItems);
        else groups.sort((a, b) => { const wA = getShelfWeight(a.groupName), wB = getShelfWeight(b.groupName); return wA !== wB ? wA - wB : a.groupName.localeCompare(b.groupName, 'ja'); });
        return groups;
      });
      const toggleShelf = (idx) => { if (openedShelves.has(idx)) openedShelves.delete(idx); else openedShelves.add(idx); };
      const toggleGroup = (gi) => { if (openedGroups.has(gi)) openedGroups.delete(gi); else openedGroups.add(gi); };
      const loadShelfData = () => {
        if (shelfLoaded) return;
        shelfLoaded = true; shelfLoading.value = true; shelfError.value = '';
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((data) => { shelfData.value = data; shelfLoading.value = false; })
            .withFailureHandler((err) => { shelfError.value = 'データ取得エラー: ' + err.message; shelfLoading.value = false; })
            .getShelfSummary();
        } else {
          setTimeout(() => {
            shelfData.value = [
              { shelf: '軟膏-1 0-4', items: [{ name: 'オルガドロン点眼液0.1%', stock: 3 }] },
              { shelf: 'センター右下-4', items: [{ name: 'ペリンドプリル錠2mg', stock: 0 }, { name: 'アムロジピン錠5mg', stock: 60 }] },
            ];
            shelfLoading.value = false;
          }, 800);
        }
      };
      const switchToShelfTab = () => { activeTab.value = 'shelf'; loadShelfData(); };

      const fetchLastUpdated = () => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((val) => { lastUpdated.value = val; })
            .withFailureHandler(() => { lastUpdated.value = '取得失敗'; })
            .getLastUpdated();
        } else { lastUpdated.value = '2026/03/09 02:00（モック）'; }
      };

      onMounted(() => { document.getElementById('search')?.focus(); fetchLastUpdated(); });

      
      const alertShelfFilter = ref('');
      const alertSort = ref('shelf');
      const alertSortOptions = [
        { value: 'stock', label: '在庫数順', icon: 'fa-solid fa-arrow-up-1-9' },
        { value: 'name', label: '医薬品名順', icon: 'fa-solid fa-arrow-down-a-z' },
        { value: 'shelf', label: '棚番順', icon: 'fa-solid fa-layer-group' },
      ];
      const sortAlertItems = (arr) => [...arr].sort((a, b) => {
        if (alertSort.value === 'name') return a.name.localeCompare(b.name, 'ja');
        if (alertSort.value === 'shelf') { const wA = getShelfWeight(a.shelf), wB = getShelfWeight(b.shelf); return wA !== wB ? wA - wB : a.shelf.localeCompare(b.shelf, 'ja'); }
        return a.stock - b.stock;
      });
      const alertData = computed(() => {
        const zero = [], low = [];
        const shelfQ = alertShelfFilter.value.toLowerCase();
        shelfData.value.forEach(shelf => {
          if (shelfQ && !shelf.shelf.toLowerCase().includes(shelfQ)) return;
          shelf.items.forEach(item => {
            const num = parseFloat(item.stock);
            if (isNaN(num)) return;
            const entry = { name: item.name, stock: num, shelf: shelf.shelf };
            if (num === 0) zero.push(entry);
            else if (num <= lowStockThreshold.value) low.push(entry);
          });
        });
        return { zero: sortAlertItems(zero), low: sortAlertItems(low), total: zero.length + low.length };
      });
      const switchToAlertTab = () => { activeTab.value = 'alert'; loadShelfData(); };

      
      const returnData = ref([]);
      const returnLoading = ref(false);
      const returnError = ref('');
      const returnFilterStr = ref('');
      let returnLoaded = false;
      const filteredReturnData = computed(() => {
        if (!returnFilterStr.value.trim()) return returnData.value;
        const q = returnFilterStr.value.toLowerCase();
        return returnData.value.filter(i => i.name.toLowerCase().includes(q) || i.shelf.toLowerCase().includes(q));
      });
      const loadReturnData = () => {
        if (returnLoaded) return;
        returnLoaded = true; returnLoading.value = true; returnError.value = '';
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((data) => { returnData.value = data; returnLoading.value = false; })
            .withFailureHandler((err) => { returnError.value = 'データ取得エラー: ' + err.message; returnLoading.value = false; })
            .getReturnRecommended();
        } else {
          setTimeout(() => { returnData.value = [{ name: 'アレンドロン酸錠35mg', stock: 100, shelf: '引出し-A' }]; returnLoading.value = false; }, 800);
        }
      };
      const switchToReturnTab = () => { activeTab.value = 'return'; loadReturnData(); };

      
      const deadData = ref([]);
      const deadLoading = ref(false);
      const deadError = ref('');
      const deadFilterStr = ref('');
      let deadLoaded = false;
      const filteredDeadData = computed(() => {
        if (!deadFilterStr.value.trim()) return deadData.value;
        const q = deadFilterStr.value.toLowerCase();
        return deadData.value.filter(i => i.name.toLowerCase().includes(q) || i.shelf.toLowerCase().includes(q));
      });
      const loadDeadData = () => {
        if (deadLoaded) return;
        deadLoaded = true; deadLoading.value = true; deadError.value = '';
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((data) => { deadData.value = data; deadLoading.value = false; })
            .withFailureHandler((err) => { deadError.value = 'データ取得エラー: ' + err.message; deadLoading.value = false; })
            .getPotentialDeadStock();
        } else {
          setTimeout(() => { deadData.value = [{ name: '古い薬Aゼリー', stock: 15, shelf: '汎用左-1' }]; deadLoading.value = false; }, 800);
        }
      };
      const switchToDeadTab = () => { activeTab.value = 'dead'; loadDeadData(); };

      
      const liveData = ref([]);
      const liveLoading = ref(false);
      const liveError = ref('');
      const liveFilterStr = ref('');
      const livePage = ref(1);
      const liveTotalCount = ref(0);
      const liveTotalPages = ref(1);
      let liveLoaded = false;

      const filteredLiveData = computed(() => {
        if (!liveFilterStr.value.trim()) return liveData.value;
        const q = liveFilterStr.value.toLowerCase();
        return liveData.value.filter(i => (i.name || '').toLowerCase().includes(q) || (i.yj_code || '').toLowerCase().includes(q));
      });

      
      const liveCachedAt     = ref('');
      const liveIsRefreshing = ref(false);

      const liveFromCache = ref(false); 

      
      const liveCachedAtStr = computed(() => {
        if (!liveCachedAt.value) return '';
        try {
          const d = new Date(liveCachedAt.value);
          return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        } catch(e) { return ''; }
      });

      const applyLiveResult = (result, p) => {
        liveData.value       = result.items || [];
        liveTotalCount.value = result.totalCount || 0;
        liveTotalPages.value = result.totalPages || 1;
        livePage.value       = result.currentPage || p;
        liveFromCache.value  = !!(result.fromCache || result._cached);
        liveCachedAt.value   = result.cachedAt || new Date().toISOString();
      };

      
      const forceReloadLive = () => loadLiveData(livePage.value, true);

      const loadLiveData = (page, forceRefresh) => {
        const p = page || livePage.value;
        
        if (forceRefresh && liveData.value.length > 0) {
          liveIsRefreshing.value = true;
        } else {
          liveLoading.value = true;
        }
        liveError.value = '';

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.error) { liveError.value = result.error; }
              else { applyLiveResult(result, p); }
              liveLoading.value = false; liveIsRefreshing.value = false;
            })
            .withFailureHandler((err) => {
              liveError.value = 'エラー: ' + err.message;
              liveLoading.value = false; liveIsRefreshing.value = false;
            })
            .getLiveStocks(p, !!forceRefresh);
        } else {
          setTimeout(() => {
            applyLiveResult({
              items: [
                { id: 1, name: 'アムロジピン錠5mg',  quantity: 580,  lot: '6318124A', expiry: '2028-12-31', last_action: 'dispense', last_acted_at: '2026-03-11T18:13:26.000+09:00', nextDelivery: null },
                { id: 2, name: 'マイナステスト薬A',  quantity: -146, lot: 'B240101',  expiry: '2027-03-31', last_action: 'dispense', last_acted_at: '2026-03-11T10:00:00.000+09:00', nextDelivery: null },
                { id: 3, name: 'マイナステスト薬B',  quantity: -10,  lot: 'C240201',  expiry: '2027-06-30', last_action: 'dispense', last_acted_at: '2026-03-10T15:30:00.000+09:00', nextDelivery: 200 },
              ],
              totalCount: 3, totalPages: 1, currentPage: 1,
              _cached: !forceRefresh, cachedAt: new Date().toISOString(),
            }, p);
            liveLoading.value = false; liveIsRefreshing.value = false;
          }, forceRefresh ? 1200 : 400);
        }
      };

      const switchToLiveTab   = () => { activeTab.value = 'live';  if (!liveLoaded) { liveLoaded = true; loadLiveData(1, false); } };
      const liveNextPage      = () => { if (livePage.value < liveTotalPages.value) loadLiveData(livePage.value + 1, false); };
      const livePrevPage      = () => { if (livePage.value > 1) loadLiveData(livePage.value - 1, false); };
      const liveForceRefresh  = () => loadLiveData(livePage.value, true);

      
      const minusSort = ref('quantity'); 
      const minusSortOptions = [
        { value: 'quantity', label: '数量順', icon: 'fa-solid fa-arrow-up-1-9' },
        { value: 'name',     label: '薬品名順', icon: 'fa-solid fa-arrow-down-a-z' },
        { value: 'date',     label: '操作日時順', icon: 'fa-solid fa-clock' },
      ];

      
      const minusStockItems = computed(() =>
        liveData.value.filter(i => parseFloat(i.quantity) < 0)
      );

      
      const minusTotalQuantity = computed(() =>
        minusStockItems.value.reduce((sum, i) => sum + parseFloat(i.quantity), 0)
      );

      
      const sortedMinusStockItems = computed(() => {
        return [...minusStockItems.value].sort((a, b) => {
          if (minusSort.value === 'name') return (a.name || '').localeCompare(b.name || '', 'ja');
          if (minusSort.value === 'date') return (b.last_acted_at || '').localeCompare(a.last_acted_at || '');
          return parseFloat(a.quantity) - parseFloat(b.quantity); 
        });
      });

      
      const formatActedAt = (dateStr) => {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr);
          return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        } catch(e) { return dateStr; }
      };

      const switchToMinusTab = () => {
        activeTab.value = 'minus';
        // RTデータが未取得なら自動で取得する
        if (!liveLoaded) { liveLoaded = true; loadLiveData(1); }
      };

      
      const isExpiringSoon = (expiryStr) => {
        if (!expiryStr) return false;
        try {
          const exp = new Date(expiryStr.replace(/\\\\//g, '-'));
          if (isNaN(exp.getTime())) return false;
          const diffDays = (exp - Date.now()) / (1000 * 60 * 60 * 24);
          return diffDays <= 90;
        } catch(e) { return false; }
      };

      return {
        activeTab, lastUpdated, lowStockThreshold, isLowStock, isExpiringSoon,
        searchQuery, lastSearchedQuery, results, primaryResults, alternativeResults, isLoading, hasSearched, errorMsg, lowStockCount,
        topSearches, recentSearches, applyHistoryQuery, clearHistory,
        performSearch, clearSearch,
        shelfData, shelfLoading, shelfError, shelfFilter, openedShelves, openedGroups,
        filteredShelfData, hierarchyData, shelfSort, sortOptions,
        shelfLowStockCount, toggleShelf, toggleGroup, switchToShelfTab,
        alertData, alertSort, alertSortOptions, alertShelfFilter, switchToAlertTab,
        returnData, returnLoading, returnError, returnFilterStr, filteredReturnData, switchToReturnTab,
        deadData, deadLoading, deadError, deadFilterStr, filteredDeadData, switchToDeadTab,
        liveData, liveLoading, liveError, liveFilterStr, filteredLiveData, livePage, liveTotalCount, liveTotalPages,
        liveCachedAt, liveCachedAtStr, liveFromCache, liveIsRefreshing, forceReloadLive,
        switchToLiveTab, loadLiveData, liveNextPage, livePrevPage,
        minusStockItems, minusTotalQuantity, sortedMinusStockItems, minusSort, minusSortOptions,
        switchToMinusTab, formatActedAt,
      };
    }
  }).mount('#app');
