name: Inventory Data Scraper

on:
  schedule:
    # 毎日 日本時間 午前5:00 に実行 (UTC 20:00)
    # 必要に応じて時間は変更してください
    - cron: '0 20 * * *'
  workflow_dispatch:
    # 手動実行ボタンを有効化

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run extractor script
      env:
        # GitHub Secrets から環境変数に値を読み込む
        GOOGLE_AUTH_STATE_BASE64: ${{ secrets.GOOGLE_AUTH_STATE_BASE64 }}
        MEDORDER_EMAIL: ${{ secrets.MEDORDER_EMAIL }}
        MEDORDER_PASSWORD: ${{ secrets.MEDORDER_PASSWORD }}
        ORDER_EPI_ID: ${{ secrets.ORDER_EPI_ID }}
        ORDER_EPI_PASSWORD: ${{ secrets.ORDER_EPI_PASSWORD }}
      run: |
        python extract_data.py
