name: Inventory Data Scraper

on:
  schedule:
    # JST 8:00-19:00 のみ30分おきに実行
    - cron: '*/30 23 * * *'   # UTC 23:00,23:30 → JST 8:00,8:30
    - cron: '*/30 0-9 * * *'  # UTC 0:00-9:30  → JST 9:00-18:30
    - cron: '0 10 * * *'      # UTC 10:00      → JST 19:00
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run extractor script
      env:
        GOOGLE_AUTH_STATE_BASE64: ${{ secrets.GOOGLE_AUTH_STATE_BASE64 }}
        MEDORDER_EMAIL: ${{ secrets.MEDORDER_EMAIL }}
        MEDORDER_PASSWORD: ${{ secrets.MEDORDER_PASSWORD }}
        ORDER_EPI_ID: ${{ secrets.ORDER_EPI_ID }}
        ORDER_EPI_PASSWORD: ${{ secrets.ORDER_EPI_PASSWORD }}
        COLLABO_ID: ${{ secrets.COLLABO_ID }}
        COLLABO_PASSWORD: ${{ secrets.COLLABO_PASSWORD }}
      run: |
        python extract_data.py
